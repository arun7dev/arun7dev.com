<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="arun">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Arun</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0A0A0F;
      overflow: hidden;
    }

    #loading_indicator {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0F;
      z-index: 9999;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      width: 260px;
    }

    .loader-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(204, 255, 0, 0.4);
      text-transform: uppercase;
    }

    .track {
      width: 100%;
      height: 1px;
      background: rgba(204, 255, 0, 0.1);
    }

    .fill {
      height: 1px;
      background: #CCFF00;
      width: 0%;
      transition: width 0.12s linear;
    }

    .loader-pct {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(204, 255, 0, 0.3);
    }
  </style>
</head>

<body>
  <div id="loading_indicator">
    <div class="loader">
      <span class="loader-label" id="status_label">initializing</span>
      <div class="track">
        <div class="fill" id="bar"></div>
      </div>
      <span class="loader-pct" id="percent_label">0%</span>
    </div>
  </div>

  <script>
    const statusLabels = ['initializing', 'loading assets', 'almost there', 'done'];
    const bar = document.getElementById('bar');
    const pct = document.getElementById('percent_label');
    const status = document.getElementById('status_label');
    let progress = 0;

    const ticker = setInterval(() => {
      progress += Math.random() * 5;
      if (progress >= 100) { progress = 100; clearInterval(ticker); }

      bar.style.width = progress + '%';
      pct.textContent = Math.floor(progress) + '%';
      status.textContent = statusLabels[Math.min(Math.floor(progress / 33), statusLabels.length - 1)];
    }, 200);
  </script>

  <script>
    var serviceWorkerVersion = '{{flutter_service_worker_version}}';
    var scriptLoaded = false;
    function loadMainDartJs() {
      if (scriptLoaded) return;
      scriptLoaded = true;
      var s = document.createElement('script');
      s.src = 'main.dart.js';
      s.type = 'application/javascript';
      document.body.append(s);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var url = 'flutter_service_worker.js?v=' + serviceWorkerVersion;
        navigator.serviceWorker.register(url).then((reg) => {
          function waitFor(sw) {
            sw.addEventListener('statechange', () => {
              if (sw.state == 'activated') { loadMainDartJs(); }
            });
          }
          if (!reg.active && (reg.installing || reg.waiting)) {
            waitFor(reg.installing || reg.waiting);
          } else if (!reg.active.scriptURL.endsWith(serviceWorkerVersion)) {
            reg.update(); waitFor(reg.installing);
          } else {
            loadMainDartJs();
          }
        });
        setTimeout(() => { if (!scriptLoaded) loadMainDartJs(); }, 4000);
      });
    } else {
      loadMainDartJs();
    }
  </script>

  <script>
    window.onload = function () {
      setTimeout(function () {
        var el = document.getElementById('loading_indicator');
        if (el) el.remove();
      }, 10000);
    };
  </script>
</body>

</html>
